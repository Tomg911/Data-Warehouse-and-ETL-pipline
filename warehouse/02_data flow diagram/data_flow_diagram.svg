<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Data Flow Diagram</title>
  <desc id="desc">Data flow diagram showing Sources, Bronze Layer, Silver Layer, and Gold Layer for a data warehouse pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfd"/>
      <stop offset="100%" stop-color="#f4f6f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000022"/>
    </filter>
    <style><![CDATA[
      .title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #222; }
      .subtitle { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #333; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #222; }
      .small { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #444; }
      .boxtext { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #333; dominant-baseline: middle; }
      .sectionText { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #333; }
      .note { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #666; }
      .grid { stroke: #e8ebf0; stroke-width: 1; }
      .panel { fill: #ffffffcc; stroke: #d6dce5; stroke-width: 2; }
      .bronze { fill: #f8ebd8; stroke: #d8b98b; stroke-width: 1.5; }
      .silver { fill: #f3f4f6; stroke: #c7ccd3; stroke-width: 1.5; }
      .gold { fill: #f8f1cf; stroke: #d7c16e; stroke-width: 1.5; }
      .headerBronze { fill: #ecd1a9; stroke: #d8b98b; stroke-width: 1.5; }
      .headerSilver { fill: #eceef2; stroke: #c7ccd3; stroke-width: 1.5; }
      .headerGold { fill: #efe0a2; stroke: #d7c16e; stroke-width: 1.5; }
      .sourceText { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #222; }
      .sourceSub { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #444; }
      .arrow { stroke: #636b74; stroke-width: 2.5; fill: none; }
      .dashed { stroke-dasharray: 6 6; }
    ]]></style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#636b74"/>
    </marker>
  </defs>

  <rect width="1400" height="760" fill="url(#bg)"/>

  <!-- grid -->
  <g opacity="0.9">
    <path class="grid" d="M0 60H1400 M0 120H1400 M0 180H1400 M0 240H1400 M0 300H1400 M0 360H1400 M0 420H1400 M0 480H1400 M0 540H1400 M0 600H1400 M0 660H1400 M0 720H1400"/>
    <path class="grid" d="M60 0V760 M120 0V760 M180 0V760 M240 0V760 M300 0V760 M360 0V760 M420 0V760 M480 0V760 M540 0V760 M600 0V760 M660 0V760 M720 0V760 M780 0V760 M840 0V760 M900 0V760 M960 0V760 M1020 0V760 M1080 0V760 M1140 0V760 M1200 0V760 M1260 0V760 M1320 0V760 M1380 0V760"/>
  </g>

  <text x="700" y="44" text-anchor="middle" class="title">Data Flow Diagram</text>

  <!-- Section titles -->
  <text x="70" y="115" class="sectionText">Sources</text>

  <!-- Outer dashed guide for sources -->
  <rect x="40" y="130" width="130" height="520" rx="14" class="panel dashed" fill="#ffffff66"/>

  <!-- Source icons -->
  <g transform="translate(58,225)">
    <path d="M0 10a10 10 0 0 1 10-10h48l18 18v56a10 10 0 0 1-10 10H10A10 10 0 0 1 0 74Z" fill="#f2c318" stroke="#c99e0f" stroke-width="2"/>
    <path d="M58 0v18h18" fill="#f8da57"/>
    <path d="M85 30h20v46H73V42z" fill="#ffffff" stroke="#6e94c9" stroke-width="2"/>
    <path d="M77 46h15M77 54h21M77 62h18" stroke="#6e94c9" stroke-width="2"/>
    <text x="16" y="120" class="sourceText">CRM</text>
  </g>

  <g transform="translate(58,455)">
    <path d="M0 10a10 10 0 0 1 10-10h48l18 18v56a10 10 0 0 1-10 10H10A10 10 0 0 1 0 74Z" fill="#f2c318" stroke="#c99e0f" stroke-width="2"/>
    <path d="M58 0v18h18" fill="#f8da57"/>
    <path d="M85 30h20v46H73V42z" fill="#ffffff" stroke="#6e94c9" stroke-width="2"/>
    <path d="M77 46h15M77 54h21M77 62h18" stroke="#6e94c9" stroke-width="2"/>
    <text x="20" y="120" class="sourceText">ERP</text>
  </g>

  <!-- Panels -->
  <g filter="url(#shadow)">
    <rect x="250" y="95" width="310" height="560" rx="22" class="panel"/>
    <rect x="620" y="95" width="310" height="560" rx="22" class="panel"/>
    <rect x="990" y="95" width="280" height="560" rx="22" class="panel"/>
  </g>

  <!-- Headers -->
  <rect x="320" y="55" width="170" height="56" rx="12" class="headerBronze"/>
  <text x="405" y="90" text-anchor="middle" class="subtitle">Bronze Layer</text>

  <rect x="690" y="55" width="170" height="56" rx="12" class="headerSilver"/>
  <text x="775" y="90" text-anchor="middle" class="subtitle">Silver Layer</text>

  <rect x="1050" y="55" width="170" height="56" rx="12" class="headerGold"/>
  <text x="1135" y="90" text-anchor="middle" class="subtitle">Gold Layer</text>

  <!-- Bronze boxes -->
  <g>
    <rect x="290" y="180" width="230" height="52" rx="10" class="bronze"/>
    <text x="405" y="206" text-anchor="middle" class="boxtext">crm_sales_details</text>

    <rect x="290" y="250" width="230" height="52" rx="10" class="bronze"/>
    <text x="405" y="276" text-anchor="middle" class="boxtext">crm_cust_info</text>

    <rect x="290" y="320" width="230" height="52" rx="10" class="bronze"/>
    <text x="405" y="346" text-anchor="middle" class="boxtext">crm_prd_info</text>

    <rect x="290" y="430" width="230" height="52" rx="10" class="bronze"/>
    <text x="405" y="456" text-anchor="middle" class="boxtext">erp_cust_az12</text>

    <rect x="290" y="500" width="230" height="52" rx="10" class="bronze"/>
    <text x="405" y="526" text-anchor="middle" class="boxtext">erp_loc_a101</text>

    <rect x="290" y="570" width="230" height="52" rx="10" class="bronze"/>
    <text x="405" y="596" text-anchor="middle" class="boxtext">erp_px_cat_g1v2</text>
  </g>

  <!-- Silver boxes -->
  <g>
    <rect x="660" y="180" width="230" height="52" rx="10" class="silver"/>
    <text x="775" y="206" text-anchor="middle" class="boxtext">crm_sales_details</text>

    <rect x="660" y="250" width="230" height="52" rx="10" class="silver"/>
    <text x="775" y="276" text-anchor="middle" class="boxtext">crm_cust_info</text>

    <rect x="660" y="320" width="230" height="52" rx="10" class="silver"/>
    <text x="775" y="346" text-anchor="middle" class="boxtext">crm_prd_info</text>

    <rect x="660" y="430" width="230" height="52" rx="10" class="silver"/>
    <text x="775" y="456" text-anchor="middle" class="boxtext">erp_cust_az12</text>

    <rect x="660" y="500" width="230" height="52" rx="10" class="silver"/>
    <text x="775" y="526" text-anchor="middle" class="boxtext">erp_loc_a101</text>

    <rect x="660" y="570" width="230" height="52" rx="10" class="silver"/>
    <text x="775" y="596" text-anchor="middle" class="boxtext">erp_px_cat_g1v2</text>
  </g>

  <!-- Gold boxes -->
  <g>
    <rect x="1065" y="190" width="190" height="56" rx="10" class="gold"/>
    <text x="1160" y="218" text-anchor="middle" class="boxtext">fact_sales</text>

    <rect x="1065" y="350" width="190" height="56" rx="10" class="gold"/>
    <text x="1160" y="378" text-anchor="middle" class="boxtext">dim_customers</text>

    <rect x="1065" y="470" width="190" height="56" rx="10" class="gold"/>
    <text x="1160" y="498" text-anchor="middle" class="boxtext">dim_products</text>
  </g>

  <!-- CRM to Bronze -->
  <path d="M160 265 H220 V206 H290" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M160 265 H220 V276 H290" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M160 265 H220 V346 H290" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- ERP to Bronze -->
  <path d="M160 495 H220 V456 H290" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M160 495 H220 V526 H290" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M160 495 H220 V596 H290" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Bronze to Silver -->
  <path d="M520 206 H660" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M520 276 H660" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M520 346 H660" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M520 456 H660" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M520 526 H660" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M520 596 H660" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Silver to Gold -->
  <path d="M890 206 H1065" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M890 276 C960 276, 995 378, 1065 378" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M890 346 C960 346, 995 498, 1065 498" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M890 456 C955 456, 995 378, 1065 378" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M890 526 C955 526, 995 378, 1065 378" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M890 596 C955 596, 995 498, 1065 498" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- footer note -->
  </svg>
