<svg viewBox="0 0 1100 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8eef5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#c89a00"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d0d8e4"/>
      <stop offset="100%" style="stop-color:#8fa0b8"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#c89a00"/>
    </linearGradient>
    <linearGradient id="srcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8eef5"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d6db5"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
    <!-- Cylinder clip -->
    <clipPath id="cylClip"><rect width="70" height="80"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1100" height="600" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="30" y="38" font-size="22" font-weight="700" fill="#1a2d4a" letter-spacing="0.5">High Level Architecture</text>
  <line x1="30" y1="46" x2="400" y2="46" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ═══════════════ SECTION LABELS ═══════════════ -->
  <!-- Sources -->
  <text x="95" y="85" font-size="15" font-weight="700" fill="#2c3e50" text-anchor="middle">Sources</text>
  <!-- Data Warehouse -->
  <text x="590" y="85" font-size="15" font-weight="700" fill="#2c3e50" text-anchor="middle">Data Warehouse</text>
  <!-- Consume -->
  <text x="990" y="85" font-size="15" font-weight="700" fill="#2c3e50" text-anchor="middle">Consume</text>

  <!-- ═══════════════ SOURCES PANEL ═══════════════ -->
  <rect x="20" y="95" width="155" height="390" rx="10" fill="url(#srcGrad)" stroke="#c8d8e8" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- CRM Icon (folder) -->
  <g transform="translate(42,115)" filter="url(#iconShadow)">
    <rect x="0" y="8" width="48" height="36" rx="4" fill="#f5a623"/>
    <rect x="0" y="8" width="22" height="8" rx="2" fill="#f5a623"/>
    <rect x="2" y="14" width="44" height="28" rx="3" fill="#ffc85a"/>
    <!-- doc lines -->
    <line x1="8" y1="22" x2="40" y2="22" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="28" x2="36" y2="28" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="34" x2="32" y2="34" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="97" y="172" font-size="13" font-weight="700" fill="#1a2d4a" text-anchor="middle">CRM</text>

  <!-- ERP Icon (folder) -->
  <g transform="translate(42,195)" filter="url(#iconShadow)">
    <rect x="0" y="8" width="48" height="36" rx="4" fill="#f5a623"/>
    <rect x="0" y="8" width="22" height="8" rx="2" fill="#f5a623"/>
    <rect x="2" y="14" width="44" height="28" rx="3" fill="#ffc85a"/>
    <line x1="8" y1="22" x2="40" y2="22" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="28" x2="36" y2="28" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="34" x2="32" y2="34" stroke="#f5a623" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="97" y="252" font-size="13" font-weight="700" fill="#1a2d4a" text-anchor="middle">ERP</text>

  <!-- Source details -->
  <line x1="35" y1="285" x2="160" y2="285" stroke="#c8d8e8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="40" y="305" font-size="10.5" font-weight="700" fill="#2c3e50">Object Type:</text>
  <text x="40" y="320" font-size="10" fill="#4a5568">CSV Files</text>
  <text x="40" y="340" font-size="10.5" font-weight="700" fill="#2c3e50">Interface:</text>
  <text x="40" y="355" font-size="10" fill="#4a5568">Files In Folders</text>

  <!-- ═══════════════ ARROW: Sources → Bronze ═══════════════ -->
  <g>
    <defs>
      <marker id="ah1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#4a90d9"/>
      </marker>
    </defs>
    <rect x="185" y="255" width="60" height="30" rx="6" fill="url(#arrowGrad)" opacity="0.85"/>
    <text x="215" y="274" font-size="9" fill="white" text-anchor="middle" font-weight="600">Files</text>
    <line x1="175" y1="270" x2="183" y2="270" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#ah1)"/>
    <line x1="245" y1="270" x2="260" y2="270" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#ah1)"/>
  </g>

  <!-- ═══════════════ BRONZE LAYER ═══════════════ -->
  <rect x="265" y="95" width="175" height="390" rx="10" fill="#fff8e8" stroke="#f5c842" stroke-width="2" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="265" y="95" width="175" height="36" rx="10" fill="url(#bronzeGrad)"/>
  <rect x="265" y="113" width="175" height="18" fill="url(#bronzeGrad)"/>
  <text x="352" y="119" font-size="13" font-weight="700" fill="#3d2800" text-anchor="middle">Bronze Layer</text>

  <!-- DB Cylinder Bronze -->
  <g transform="translate(317,140)">
    <ellipse cx="35" cy="10" rx="35" ry="10" fill="#f5c842"/>
    <rect x="0" y="10" width="70" height="55" fill="#e0a800"/>
    <ellipse cx="35" cy="65" rx="35" ry="10" fill="#c89a00"/>
    <ellipse cx="35" cy="10" rx="35" ry="10" fill="#f5c842"/>
    <text x="35" y="44" font-size="10" fill="#3d2800" text-anchor="middle" font-weight="600">Raw</text>
  </g>
  <text x="352" y="225" font-size="12" font-weight="700" fill="#3d2800" text-anchor="middle">Raw Data</text>

  <line x1="278" y1="240" x2="428" y2="240" stroke="#f5c842" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="278" y="258" font-size="10.5" font-weight="700" fill="#3d2800">Object Type:</text>
  <text x="278" y="272" font-size="10" fill="#6b4800">Tables</text>

  <text x="278" y="290" font-size="10.5" font-weight="700" fill="#3d2800">Load:</text>
  <text x="285" y="305" font-size="9.5" fill="#6b4800">• Batch Processing</text>
  <text x="285" y="318" font-size="9.5" fill="#6b4800">• Full Load</text>
  <text x="285" y="331" font-size="9.5" fill="#6b4800">• Truncate &amp; Insert</text>

  <text x="278" y="350" font-size="10.5" font-weight="700" fill="#3d2800">No Transformations</text>

  <text x="278" y="370" font-size="10.5" font-weight="700" fill="#3d2800">Data Model:</text>
  <text x="278" y="384" font-size="9.5" fill="#6b4800">None (as-is)</text>

  <!-- ARROW Bronze → Silver -->
  <g>
    <defs>
      <marker id="ah2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#4a90d9"/>
      </marker>
    </defs>
    <rect x="452" y="255" width="60" height="30" rx="6" fill="url(#arrowGrad)" opacity="0.85"/>
    <text x="482" y="274" font-size="9" fill="white" text-anchor="middle" font-weight="600">Batch</text>
    <line x1="440" y1="270" x2="450" y2="270" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#ah2)"/>
    <line x1="512" y1="270" x2="527" y2="270" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#ah2)"/>
  </g>

  <!-- ═══════════════ SILVER LAYER ═══════════════ -->
  <rect x="532" y="95" width="175" height="390" rx="10" fill="#f5f7fa" stroke="#8fa0b8" stroke-width="2" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="532" y="95" width="175" height="36" rx="10" fill="url(#silverGrad)"/>
  <rect x="532" y="113" width="175" height="18" fill="url(#silverGrad)"/>
  <text x="619" y="119" font-size="13" font-weight="700" fill="#1a2d4a" text-anchor="middle">Silver Layer</text>

  <!-- DB Cylinder Silver -->
  <g transform="translate(584,140)">
    <ellipse cx="35" cy="10" rx="35" ry="10" fill="#d0d8e4"/>
    <rect x="0" y="10" width="70" height="55" fill="#a0b0c8"/>
    <ellipse cx="35" cy="65" rx="35" ry="10" fill="#7890a8"/>
    <ellipse cx="35" cy="10" rx="35" ry="10" fill="#d0d8e4"/>
    <text x="35" y="44" font-size="9" fill="#1a2d4a" text-anchor="middle" font-weight="600">Clean</text>
  </g>
  <text x="619" y="225" font-size="11" font-weight="700" fill="#1a2d4a" text-anchor="middle">Cleaned, Standardized</text>
  <text x="619" y="238" font-size="11" font-weight="700" fill="#1a2d4a" text-anchor="middle">Data</text>

  <line x1="545" y1="248" x2="695" y2="248" stroke="#8fa0b8" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="545" y="265" font-size="10.5" font-weight="700" fill="#1a2d4a">Object Type:</text>
  <text x="545" y="279" font-size="10" fill="#4a5568">Tables</text>

  <text x="545" y="296" font-size="10.5" font-weight="700" fill="#1a2d4a">Load:</text>
  <text x="552" y="310" font-size="9.5" fill="#4a5568">• Batch Processing</text>
  <text x="552" y="323" font-size="9.5" fill="#4a5568">• Full Load</text>
  <text x="552" y="336" font-size="9.5" fill="#4a5568">• Truncate &amp; Insert</text>

  <text x="545" y="353" font-size="10.5" font-weight="700" fill="#1a2d4a">Transformations:</text>
  <text x="552" y="367" font-size="9.5" fill="#4a5568">• Data Cleansing</text>
  <text x="552" y="380" font-size="9.5" fill="#4a5568">• Data Standardization</text>
  <text x="552" y="393" font-size="9.5" fill="#4a5568">• Data Normalization</text>
  <text x="552" y="406" font-size="9.5" fill="#4a5568">• Derived Columns</text>
  <text x="552" y="419" font-size="9.5" fill="#4a5568">• Data Enrichment</text>

  <text x="545" y="440" font-size="10.5" font-weight="700" fill="#1a2d4a">Data Model:</text>
  <text x="545" y="454" font-size="9.5" fill="#4a5568">None (as-is)</text>

  <!-- ARROW Silver → Gold -->
  <g>
    <defs>
      <marker id="ah3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#4a90d9"/>
      </marker>
    </defs>
    <rect x="719" y="255" width="60" height="30" rx="6" fill="url(#arrowGrad)" opacity="0.85"/>
    <text x="749" y="274" font-size="9" fill="white" text-anchor="middle" font-weight="600">Batch</text>
    <line x1="707" y1="270" x2="717" y2="270" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#ah3)"/>
    <line x1="779" y1="270" x2="794" y2="270" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#ah3)"/>
  </g>

  <!-- ═══════════════ GOLD LAYER ═══════════════ -->
  <rect x="799" y="95" width="175" height="390" rx="10" fill="#fffbe8" stroke="#f5c842" stroke-width="2.5" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="799" y="95" width="175" height="36" rx="10" fill="url(#goldGrad)"/>
  <rect x="799" y="113" width="175" height="18" fill="url(#goldGrad)"/>
  <text x="886" y="119" font-size="13" font-weight="700" fill="#3d2800" text-anchor="middle">Gold Layer</text>

  <!-- DB Cylinder Gold -->
  <g transform="translate(851,140)">
    <ellipse cx="35" cy="10" rx="35" ry="10" fill="#f5c842"/>
    <rect x="0" y="10" width="70" height="55" fill="#e0a800"/>
    <ellipse cx="35" cy="65" rx="35" ry="10" fill="#c89a00"/>
    <ellipse cx="35" cy="10" rx="35" ry="10" fill="#f5c842"/>
    <text x="35" y="44" font-size="9" fill="#3d2800" text-anchor="middle" font-weight="600">Gold</text>
  </g>
  <text x="886" y="225" font-size="11" font-weight="700" fill="#3d2800" text-anchor="middle">Business-Ready Data</text>

  <line x1="812" y1="238" x2="962" y2="238" stroke="#f5c842" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="812" y="256" font-size="10.5" font-weight="700" fill="#3d2800">Object Type:</text>
  <text x="812" y="270" font-size="10" fill="#6b4800">Views</text>

  <text x="812" y="288" font-size="10.5" font-weight="700" fill="#3d2800">No Load</text>

  <text x="812" y="307" font-size="10.5" font-weight="700" fill="#3d2800">Transformations:</text>
  <text x="820" y="321" font-size="9.5" fill="#6b4800">• Data Integrations</text>
  <text x="820" y="334" font-size="9.5" fill="#6b4800">• Aggregations</text>
  <text x="820" y="347" font-size="9.5" fill="#6b4800">• Business Logics</text>

  <text x="812" y="366" font-size="10.5" font-weight="700" fill="#3d2800">Data Model:</text>
  <text x="820" y="380" font-size="9.5" fill="#6b4800">• Star Schema</text>
  <text x="820" y="393" font-size="9.5" fill="#6b4800">• Flat Table</text>
  <text x="820" y="406" font-size="9.5" fill="#6b4800">• Aggregated Table</text>

  <!-- ═══════════════ ARROW Gold → Consume ═══════════════ -->
  <g>
    <defs>
      <marker id="ah4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#4a90d9"/>
      </marker>
    </defs>
    <line x1="974" y1="270" x2="989" y2="270" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#ah4)"/>
  </g>

  <!-- ═══════════════ CONSUME PANEL ═══════════════ -->
  <rect x="995" y="95" width="88" height="390" rx="10" fill="url(#srcGrad)" stroke="#c8d8e8" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- BI & Reporting Icon -->
  <g transform="translate(1005,115)">
    <!-- Bar chart icon -->
    <rect x="2" y="22" width="10" height="18" rx="2" fill="#f5a623"/>
    <rect x="16" y="14" width="10" height="26" rx="2" fill="#4a90d9"/>
    <rect x="30" y="8" width="10" height="32" rx="2" fill="#2ecc71"/>
    <rect x="44" y="18" width="10" height="22" rx="2" fill="#e74c3c"/>
    <!-- sparkle -->
    <circle cx="52" cy="6" r="3" fill="#f5c842"/>
    <line x1="52" y1="1" x2="52" y2="11" stroke="#f5c842" stroke-width="1.5"/>
    <line x1="47" y1="6" x2="57" y2="6" stroke="#f5c842" stroke-width="1.5"/>
    <line x1="49" y1="3" x2="55" y2="9" stroke="#f5c842" stroke-width="1"/>
    <line x1="55" y1="3" x2="49" y2="9" stroke="#f5c842" stroke-width="1"/>
  </g>
  <text x="1039" y="170" font-size="10" font-weight="700" fill="#1a2d4a" text-anchor="middle">BI &amp; Reporting</text>

  <!-- Ad-Hoc SQL Queries Icon -->
  <g transform="translate(1005,200)">
    <rect x="2" y="2" width="60" height="42" rx="6" fill="#2d6db5"/>
    <rect x="6" y="6" width="52" height="34" rx="4" fill="#1a3a6b"/>
    <!-- SQL text sim -->
    <text x="32" y="22" font-size="9" fill="#4a90d9" text-anchor="middle" font-weight="700">SQL</text>
    <text x="32" y="33" font-size="7" fill="#7ec8e3" text-anchor="middle">SELECT *</text>
    <!-- magnifier -->
    <circle cx="52" cy="6" r="7" fill="none" stroke="#f5c842" stroke-width="2"/>
    <line x1="57" y1="11" x2="63" y2="17" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="1039" y="258" font-size="10" font-weight="700" fill="#1a2d4a" text-anchor="middle">Ad-Hoc</text>
  <text x="1039" y="270" font-size="10" font-weight="700" fill="#1a2d4a" text-anchor="middle">SQL Queries</text>

  <!-- Machine Learning Icon -->
  <g transform="translate(1005,295)">
    <!-- neural network nodes -->
    <circle cx="8" cy="10" r="7" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="8" cy="30" r="7" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="8" cy="50" r="7" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="35" cy="20" r="7" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <circle cx="35" cy="40" r="7" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <circle cx="62" cy="30" r="7" fill="none" stroke="#3498db" stroke-width="2"/>
    <!-- connections -->
    <line x1="15" y1="10" x2="28" y2="20" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="15" y1="10" x2="28" y2="40" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="15" y1="30" x2="28" y2="20" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="15" y1="30" x2="28" y2="40" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="15" y1="50" x2="28" y2="20" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="15" y1="50" x2="28" y2="40" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="42" y1="20" x2="55" y2="30" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="42" y1="40" x2="55" y2="30" stroke="#bdc3c7" stroke-width="1"/>
  </g>
  <text x="1039" y="365" font-size="10" font-weight="700" fill="#1a2d4a" text-anchor="middle">Machine</text>
  <text x="1039" y="377" font-size="10" font-weight="700" fill="#1a2d4a" text-anchor="middle">Learning</text>

  <!-- ═══════════════ DW BOUNDING BOX ═══════════════ -->
  <rect x="258" y="78" width="724" height="420" rx="12" fill="none" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.5"/>

  <!-- ═══════════════ FOOTER ═══════════════ -->
  <text x="550" y="570" font-size="10" fill="#8899aa" text-anchor="middle">Data Warehouse — Medallion Architecture  |  Bronze → Silver → Gold</text>
</svg>
